spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventorydb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

server.port=${SERVER_PORT:8085}

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:inventory-pro-local-development-secret-change-me}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
